<svg width="100%" viewBox="0 0 900 180" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Four time-of-day icons: daytime, sunset, night, midnight</title>
  <desc>Minimal monochrome SVG icons for daytime, golden hour, night with moon and stars, and midnight crescent moon</desc>

  <!-- ── 1. DAYTIME ── -->
  <g transform="translate(100,80)">
    <circle cx="0" cy="0" r="18" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <line x1="0" y1="-28" x2="0" y2="-34" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="0" y1="28" x2="0" y2="34" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="-28" y1="0" x2="-34" y2="0" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="28" y1="0" x2="34" y2="0" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="-20" y1="-20" x2="-24" y2="-24" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="20" y1="-20" x2="24" y2="-24" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="-20" y1="20" x2="-24" y2="24" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="20" y1="20" x2="24" y2="24" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
  </g>
  <text x="100" y="148" style="fill:rgb(194, 192, 182);stroke:none;font-family:'Anthropic Sans', sans-serif;font-size:12px;font-weight:400;text-anchor:middle;">Daytime</text>

  <!-- ── 2. GOLDEN HOUR ── -->
  <g transform="translate(330,90)">
    <path d="M -20,0 A 20,20 0 0 1 20,0 Z" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <line x1="-38" y1="0" x2="38" y2="0" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="0" y1="-30" x2="0" y2="-36" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="-22" y1="-15" x2="-26" y2="-18" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="22" y1="-15" x2="26" y2="-18" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="-30" y1="-2" x2="-36" y2="-2" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="30" y1="-2" x2="36" y2="-2" stroke-width="2.5" style="fill:none;stroke:rgb(250, 249, 245);stroke-linecap:round;"/>
    <line x1="-14" y1="8" x2="14" y2="8" stroke-width="2" style="fill:none;stroke:rgb(194, 192, 182);stroke-linecap:round;"/>
    <line x1="-10" y1="15" x2="10" y2="15" stroke-width="2" style="fill:none;stroke:rgb(194, 192, 182);stroke-linecap:round;"/>
    <line x1="-6" y1="22" x2="6" y2="22" stroke-width="2" style="fill:none;stroke:rgb(194, 192, 182);stroke-linecap:round;"/>
  </g>
  <text x="330" y="148" style="fill:rgb(194, 192, 182);stroke:none;font-family:'Anthropic Sans', sans-serif;font-size:12px;font-weight:400;text-anchor:middle;">Golden hour</text>

  <!-- ── 3. NIGHT — filled crescent + 4-point stars ── -->
  <g transform="translate(570,80)">
    <path d="M -6,-22 A 23,23 0 1 1 -6,22 A 14,14 0 1 0 -6,-22 Z" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <path d="M 22,-26 L 24,-20 L 30,-18 L 24,-16 L 22,-10 L 20,-16 L 14,-18 L 20,-20 Z" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <path d="M 32,8 L 33.5,12 L 38,13.5 L 33.5,15 L 32,19 L 30.5,15 L 26,13.5 L 30.5,12 Z" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <circle cx="18" cy="26" r="2" style="fill:rgb(194, 192, 182);stroke:none;"/>
    <circle cx="-28" cy="-20" r="1.5" style="fill:rgb(194, 192, 182);stroke:none;"/>
  </g>
  <text x="570" y="148" style="fill:rgb(194, 192, 182);stroke:none;font-family:'Anthropic Sans', sans-serif;font-size:12px;font-weight:400;text-anchor:middle;">Night</text>

  <!-- ── 4. MIDNIGHT — filled circle moon + sparkly stars ── -->
  <g transform="translate(800,80)">
    <circle cx="-4" cy="0" r="22" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <path d="M 22,-26 L 24,-20 L 30,-18 L 24,-16 L 22,-10 L 20,-16 L 14,-18 L 20,-20 Z" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <path d="M 32,8 L 33.5,12 L 38,13.5 L 33.5,15 L 32,19 L 30.5,15 L 26,13.5 L 30.5,12 Z" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <path d="M -30,-10 L -29,-7 L -26,-6 L -29,-5 L -30,-2 L -31,-5 L -34,-6 L -31,-7 Z" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <path d="M -28,16 L -27,19 L -24,20 L -27,21 L -28,24 L -29,21 L -32,20 L -29,19 Z" style="fill:rgb(250, 249, 245);stroke:none;"/>
    <circle cx="16" cy="26" r="2" style="fill:rgb(194, 192, 182);stroke:none;"/>
    <circle cx="-30" cy="-24" r="1.5" style="fill:rgb(194, 192, 182);stroke:none;"/>
    <circle cx="36" cy="-4" r="1.5" style="fill:rgb(194, 192, 182);stroke:none;"/>
    <circle cx="-8" cy="-36" r="1.5" style="fill:rgb(194, 192, 182);stroke:none;"/>
    <circle cx="28" cy="30" r="1" style="fill:rgb(194, 192, 182);stroke:none;"/>
  </g>
  <text x="800" y="148" style="fill:rgb(194, 192, 182);stroke:none;font-family:'Anthropic Sans', sans-serif;font-size:12px;font-weight:400;text-anchor:middle;">Midnight</text>

</svg>
