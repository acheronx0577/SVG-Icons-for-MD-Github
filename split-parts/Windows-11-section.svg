<svg width="100%" viewBox="-20 287 689 72" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Windows 11 - Operating System Stats</title>
  <desc>Windows 11 coding time statistics</desc>
  <defs>
    <style>
@font-face {
  font-family: 'Caveat';
  font-weight: 400;
  src: url('data:font/woff2;base64,...') format('woff2');
}
    </style>
    <linearGradient id="win-bar-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"    stop-color="#64b5f6"/>
      <stop offset="16.6%" stop-color="#42a5f5"/>
      <stop offset="33.3%" stop-color="#2196f3"/>
      <stop offset="50%"   stop-color="#1e88e5"/>
      <stop offset="66.6%" stop-color="#1976d2"/>
      <stop offset="83.3%" stop-color="#1565c0"/>
      <stop offset="100%"  stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <rect x="-20" y="287" width="689" height="72" fill="#0d1117" rx="0"/>

  <!-- Operating System Header -->
  <g transform="translate(1, 304) scale(0.032)">
    <path d="M128 32C92.7 32 64 60.7 64 96l0 240 64 0 0-240 384 0 0 240 64 0 0-240c0-35.3-28.7-64-64-64L128 32zM19.2 384C8.6 384 0 392.6 0 403.2 0 445.6 34.4 480 76.8 480l486.4 0c42.4 0 76.8-34.4 76.8-76.8 0-10.6-8.6-19.2-19.2-19.2L19.2 384z" fill="#84abce"/>
  </g>
  <text x="26" y="318" font-family="Caveat, monospace" font-size="16" fill="#84abce" font-weight="600">Operating System:</text>

  <!-- Windows 11 Icon -->
  <g transform="translate(18, 328) scale(0.29)">
    <path fill="#1976d2" d="M6,6h17v17H6V6z"/>
    <path fill="#1976d2" d="M25.042,22.958V6H42v16.958H25.042z"/>
    <path fill="#1976d2" d="M6,25h17v17H6V25z"/>
    <path fill="#1976d2" d="M25,42V25h17v17H25z"/>
  </g>

  <!-- Windows 11 Text -->
  <text x="36" y="340" font-family="Caveat, monospace" font-size="14" fill="#c9d1d9">Windows 11</text>
  
  <!-- Hours -->
  <text x="170" y="340" font-family="Caveat, monospace" font-size="14" fill="#8b949e">3,285 hrs</text>
  
  <!-- Progress Bar -->
  <rect x="250" y="332" width="360" height="8" rx="0" fill="#172f45"/>
  <rect x="250" y="332" width="360" height="8" rx="0" fill="url(#win-bar-gradient)"/>
  
  <!-- Percentage -->
  <text x="618" y="340" font-family="Caveat, monospace" font-size="13" fill="#8b949e">100%</text>
</svg>
