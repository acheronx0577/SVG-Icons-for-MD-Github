name: Waka Readme

on:
  schedule:
    - cron: "30 18 * * *"   # daily 6:30 PM UTC — change if you like
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BAR_STYLE: "svg"
          BAR_COLOR: "#90CAF9"
          BAR_TRACK_COLOR: "#172f45"
          BAR_RADIUS: "4"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_TIMEZONE: "False"
          SHOW_EDITORS: "True"
          SHOW_PROJECTS: "True"
          SHOW_OS: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LANGUAGE_PER_REPO: "False"
