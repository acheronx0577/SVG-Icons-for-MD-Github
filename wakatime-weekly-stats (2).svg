  <g transform="translate(0, 172) scale(0.075)">
    <g transform="translate(110, 105)">
      <path d="M-110,90 Q-110,105 -95,105 L95,105 Q110,105 110,90 L110,-60 Q110,-75 95,-75 L-5,-75 Q-14,-75 -20,-85 L-28,-95 Q-34,-105 -50,-105 L-95,-105 Q-110,-105 -110,-90 Z" fill="#84abce" stroke="#84abce" stroke-width="9" stroke-linejoin="round"/>
      <polyline points="-32,-6 -52,14 -32,34" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="32,-6 52,14 32,34" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="16" y1="-18" x2="-16" y2="48" stroke="#fff" stroke-width="13" stroke-linecap="round"/>
