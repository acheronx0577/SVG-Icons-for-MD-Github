      <polyline points="-28,-20 -48,0 -28,20" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="28,-20 48,0 28,20" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="10" y1="-30" x2="-10" y2="26" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    </g>
  </g>
  <text x="22" y="70" font-family="Caveat, monospace" font-size="16" fill="#84abce" font-weight="600">Programming Languages:</text>
  <text x="18" y="90" font-family="Caveat, monospace" font-size="15" fill="#8b949e">No Activity Tracked This Week</text>

  <!-- Editors: Monitor icon -->
  <g transform="translate(0, 114) scale(0.116)">
    <g transform="translate(72, 72)">
      <rect x="-68" y="-62" width="136" height="100" rx="10" fill="#84abce" stroke="#84abce" stroke-width="6"/>
      <rect x="-58" y="-52" width="116" height="82" rx="4" fill="#fff" fill-opacity="0.15" stroke="#fff" stroke-width="3"/>
      <circle cx="-44" cy="-42" r="3.5" fill="#fff"/>
      <circle cx="-34" cy="-42" r="3.5" fill="#fff"/>
      <circle cx="-24" cy="-42" r="3.5" fill="#fff"/>
      <rect x="-12" y="-47" width="52" height="10" rx="3" fill="#fff"/>
