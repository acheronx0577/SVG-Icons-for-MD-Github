      <polyline points="-18,-8 -28,0 -18,8" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="18,-8 28,0 18,8" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="6" y1="-12" x2="-6" y2="12" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
      <rect x="-8" y="37" width="16" height="22" rx="2" fill="#84abce" stroke="#84abce" stroke-width="2"/>
