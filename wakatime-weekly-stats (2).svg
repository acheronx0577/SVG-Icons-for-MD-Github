  <g transform="translate(0, 236) scale(0.028)">
    <path d="M128 32C92.7 32 64 60.7 64 96l0 240 64 0 0-240 384 0 0 240 64 0 0-240c0-35.3-28.7-64-64-64L128 32zM19.2 384C8.6 384 0 392.6 0 403.2 0 445.6 34.4 480 76.8 480l486.4 0c42.4 0 76.8-34.4 76.8-76.8 0-10.6-8.6-19.2-19.2-19.2L19.2 384z" fill="#84abce"/>
  </g>
  <text x="22" y="250" font-family="Caveat, monospace" font-size="16" fill="#84abce" font-weight="600">Operating System:</text>
  <text x="18" y="270" font-family="Caveat, monospace" font-size="15" fill="#8b949e">No Activity Tracked This Week</text>

