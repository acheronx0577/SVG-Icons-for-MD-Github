      <line x1="0" y1="-64" x2="0" y2="-56" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="32" y1="-55.4" x2="28" y2="-48.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="55.4" y1="-32" x2="48.5" y2="-28" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="64" y1="0" x2="56" y2="0" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55.4" y1="32" x2="48.5" y2="28" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="32" y1="55.4" x2="28" y2="48.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="64" x2="0" y2="56" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-32" y1="55.4" x2="-28" y2="48.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-55.4" y1="32" x2="-48.5" y2="28" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-64" y1="0" x2="-56" y2="0" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-55.4" y1="-32" x2="-48.5" y2="-28" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-32" y1="-55.4" x2="-28" y2="-48.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="0" y2="-44" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="44" y2="0" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
